<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Diagram - PAM Governance</title>

  <!-- Typography and Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --color-primary: #0F172A;
      --color-border: #0F172A;
      --color-bg: #FFFFFF;
      --color-text-main: #0F172A;
      --color-text-muted: #475569;
      --font-serif: 'Cinzel', serif;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      border-radius: 0 !important; /* Strict sharp corners */
    }

    body {
      font-family: var(--font-sans);
      background-color: #F8FAFC;
      color: var(--color-text-main);
      line-height: 1.6;
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      max-width: 1200px;
      width: 100%;
    }

    .academic-label {
      font-family: var(--font-sans);
      text-transform: uppercase;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--color-primary);
      margin-bottom: 0.5rem;
      display: inline-block;
    }

    h1 {
      font-family: var(--font-serif);
      color: var(--color-primary);
      font-size: 2.2rem;
      font-weight: 800;
      margin-bottom: 0.75rem;
      line-height: 1.2;
      letter-spacing: 0.5px;
    }

    .subtitle {
      color: var(--color-text-muted);
      font-size: 1.1rem;
      max-width: 800px;
      margin: 0 auto;
      font-weight: 500;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      background: #FFFFFF;
      padding: 0.6rem 1.25rem;
      border: 1.5px solid var(--color-primary);
      box-shadow: 4px 4px 0px 0px rgba(15, 23, 42, 0.08);
    }

    .btn {
      font-family: var(--font-sans);
      font-weight: 700;
      font-size: 0.85rem;
      padding: 0.5rem 1.25rem;
      border: 1.5px solid var(--color-primary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.15s ease;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--color-primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: #334155;
      border-color: #334155;
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0px 0px var(--color-primary);
    }

    .btn-secondary {
      background-color: transparent;
      color: var(--color-primary);
      border: 1.5px solid #E2E8F0;
    }

    .btn-secondary:hover {
      background-color: #F1F5F9;
      border-color: var(--color-primary);
      transform: translate(-2px, -2px);
      box-shadow: 2px 2px 0px 0px var(--color-primary);
    }

    /* Canvas Frame */
    .canvas-container {
      width: 100%;
      max-width: 1350px;
      aspect-ratio: 19/9;
      background: #FFFFFF;
      border: 2px solid var(--color-primary);
      box-shadow: 8px 8px 0px 0px rgba(15, 23, 42, 0.05);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      color: var(--color-text-muted);
      font-size: 0.85rem;
    }

    @media print {
      body {
        background-color: white;
        padding: 0;
      }
      .controls, footer {
        display: none;
      }
      .canvas-container {
        border: none;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>

  <header>
    <span class="academic-label">Cloud-Native Architecture</span>
    <h1>System Architecture - Zero-Trust PAM Platform</h1>
    <p class="subtitle">Components, trust zones and data flows of the PAM Governance platform</p>
  </header>

  <div class="controls">
    <button class="btn btn-primary" onclick="downloadPNG()">
      <i class="fa-solid fa-file-image"></i> Download PNG (300 DPI)
    </button>
    <button class="btn btn-secondary" onclick="downloadSVG('light')">
      <i class="fa-solid fa-sun"></i> SVG Light
    </button>
    <button class="btn btn-secondary" onclick="downloadSVG('dark')">
      <i class="fa-solid fa-moon"></i> SVG Dark
    </button>
  </div>

  <div class="canvas-container">
    <svg id="infographic" viewBox="0 0 1900 900" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap');
          .svg-text { font-family: 'Plus Jakarta Sans', sans-serif; }
          .title-text { font-family: 'Cinzel', serif; font-weight: 800; fill: #0F172A; }
          .node-title { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 14px; fill: #0F172A; }
          .label-text { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; fill: #475569; }
          .zone-text  { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 0.06em; fill: #0F172A; }
          .flow-text  { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; font-size: 11px; fill: #0F172A; }
        </style>
      </defs>

      <!-- BACKGROUND (Transparent) -->
      <rect id="svg-bg-color" width="100%" height="100%" fill="transparent" />
      <rect id="svg-border" x="20" y="20" width="1860" height="860" fill="none" stroke="#0F172A" stroke-width="1.5" />

      <!-- TITLE -->
      <text class="title-text" x="950" y="62" text-anchor="middle" letter-spacing="0.5px">
        <tspan font-size="20">SYSTEM ARCHITECTURE: PAM GOVERNANCE PLATFORM</tspan>
      </text>

      <!-- ==================== TRUST ZONES ==================== -->
      <!-- Azure boundary -->
      <rect x="280" y="250" width="1580" height="520" fill="none" stroke="#0F172A" stroke-width="1.5" stroke-dasharray="2,3" />
      <text class="svg-text zone-text" x="300" y="283">MICROSOFT AZURE</text>

      <!-- AKS cluster zone -->
      <rect x="320" y="312" width="640" height="358" fill="none" stroke="#0F172A" stroke-width="1.5" />
      <text class="svg-text zone-text" x="340" y="340">AKS CLUSTER  ·  ISTIO MESH (mTLS)</text>

      <!-- Hardened VM zone -->
      <rect x="1050" y="312" width="790" height="358" fill="none" stroke="#0F172A" stroke-width="1.5" />
      <text class="svg-text zone-text" x="1070" y="340">HARDENED VM  ·  NSG ALLOW-LIST</text>

      <!-- ==================== NODE BOXES ==================== -->
      <g fill="#FFFFFF" stroke="#0F172A" stroke-width="2">
        <rect x="65" y="390" width="150" height="58" />       <!-- User -->
        <rect x="470" y="100" width="360" height="90" />      <!-- Auth0 -->
        <rect x="350" y="370" width="580" height="64" />      <!-- Kong -->
        <rect x="350" y="518" width="580" height="112" />     <!-- Angular SPA -->
        <rect x="340" y="690" width="330" height="55" />      <!-- ACR -->
        <rect x="1080" y="372" width="380" height="125" />    <!-- Vault -->
        <rect x="1490" y="372" width="320" height="125" />    <!-- Splunk -->
        <rect x="1080" y="690" width="400" height="55" />     <!-- Key Vault -->
        <rect x="280" y="800" width="1580" height="52" />     <!-- Terraform strip -->
      </g>

      <!-- Client stickman (above the User box) -->
      <g stroke="#0F172A" stroke-width="2" fill="transparent">
        <circle cx="140" cy="352" r="9" />
        <line x1="140" y1="361" x2="140" y2="382" />
        <line x1="123" y1="370" x2="157" y2="370" />
        <line x1="140" y1="382" x2="129" y2="386" />
        <line x1="140" y1="382" x2="151" y2="386" />
      </g>

      <!-- ==================== NODE LABELS ==================== -->
      <g fill="#0F172A" stroke="none">
        <text class="svg-text node-title" x="140" y="416" text-anchor="middle">Privileged User</text>
        <text class="svg-text label-text" x="140" y="434" text-anchor="middle">Browser</text>

        <text class="svg-text node-title" x="650" y="134" text-anchor="middle">Auth0</text>
        <text class="svg-text label-text" x="650" y="155" text-anchor="middle">OpenID Connect  ·  SSO</text>
        <text class="svg-text label-text" x="650" y="173" text-anchor="middle">MFA (TOTP)  ·  RBAC roles</text>

        <text class="svg-text node-title" x="640" y="397" text-anchor="middle">Kong API Gateway</text>
        <text class="svg-text label-text" x="640" y="418" text-anchor="middle">Public LoadBalancer  ·  HTTPS redirect  ·  rate-limit</text>

        <text class="svg-text node-title" x="640" y="552" text-anchor="middle">Angular SPA (Portal)</text>
        <text class="svg-text label-text" x="640" y="575" text-anchor="middle">non-root nginx  ·  read-only filesystem</text>
        <text class="svg-text label-text" x="640" y="595" text-anchor="middle">strict CSP  ·  in-memory tokens  ·  /dashboard</text>

        <text class="svg-text node-title" x="505" y="712" text-anchor="middle">Azure Container Registry</text>
        <text class="svg-text label-text" x="505" y="730" text-anchor="middle">Angular app image</text>

        <text class="svg-text node-title" x="1270" y="405" text-anchor="middle">HashiCorp Vault (TLS :8200)</text>
        <text class="svg-text label-text" x="1270" y="428" text-anchor="middle">Dynamic secrets: SSH CA · DB · Transit · KV</text>
        <text class="svg-text label-text" x="1270" y="448" text-anchor="middle">Least-privilege RBAC  ·  OIDC login</text>
        <text class="svg-text label-text" x="1270" y="468" text-anchor="middle">forensic audit device</text>

        <text class="svg-text node-title" x="1650" y="415" text-anchor="middle">Splunk SIEM</text>
        <text class="svg-text label-text" x="1650" y="438" text-anchor="middle">index pam_audit</text>
        <text class="svg-text label-text" x="1650" y="458" text-anchor="middle">dashboard + alerts</text>

        <text class="svg-text node-title" x="1280" y="712" text-anchor="middle">Azure Key Vault</text>
        <text class="svg-text label-text" x="1280" y="730" text-anchor="middle">unseal keys + root token</text>

        <text class="svg-text zone-text" x="1070" y="831" text-anchor="middle">INFRASTRUCTURE-AS-CODE  ·  TERRAFORM MODULES: network · key-vault · compute · aks · registry · auth0</text>
      </g>

      <!-- ==================== FLOWS (lines) ==================== -->
      <g fill="none" stroke="#0F172A" stroke-width="1.5">
        <!-- 1. User -> Kong -->
        <path d="M 215,416 L 300,416 L 300,402 L 348,402" />
        <!-- 2. User -> Auth0 (OIDC redirect) -->
        <path d="M 190,388 L 190,145 L 468,145" />
        <!-- 2b. Auth0 -> User (id token, dashed return) -->
        <path d="M 468,168 L 212,168 L 212,388" stroke-dasharray="5,3" />
        <!-- 3. Auth0 -> Vault (Vault OIDC login) -->
        <path d="M 832,145 L 1270,145 L 1270,370" />
        <!-- 4. Kong -> SPA (internal, mesh) -->
        <path d="M 640,436 L 640,516" />
        <!-- 5. ACR -> SPA (image pull, dashed) -->
        <path d="M 505,688 L 505,632" stroke-dasharray="5,3" />
        <!-- 6. Vault -> Splunk (audit) -->
        <path d="M 1462,434 L 1488,434" />
        <!-- 7. Vault -> Key Vault (escrow) -->
        <path d="M 1270,499 L 1270,688" />
      </g>

      <!-- ==================== ARROW HEADS ==================== -->
      <g fill="#0F172A" stroke="none">
        <polygon points="350,402 342,398 342,406" />   <!-- ->Kong -->
        <polygon points="470,145 462,141 462,149" />   <!-- ->Auth0 -->
        <polygon points="212,388 208,380 216,380" />   <!-- ->User (down) -->
        <polygon points="1270,372 1266,364 1274,364" /><!-- ->Vault (down) -->
        <polygon points="640,518 636,510 644,510" />   <!-- ->SPA (down) -->
        <polygon points="505,630 501,638 509,638" />   <!-- ->SPA (up) -->
        <polygon points="1490,434 1482,430 1482,438" /><!-- ->Splunk -->
        <polygon points="1270,690 1266,682 1274,682" /><!-- ->KeyVault (down) -->
      </g>

      <!-- ==================== FLOW LABELS (each stated once) ==================== -->
      <g fill="#0F172A" stroke="none">
        <text class="svg-text flow-text" x="238" y="410" text-anchor="start">1 · HTTPS /dashboard</text>
        <text class="svg-text flow-text" x="228" y="138" text-anchor="start">2 · OIDC redirect (SSO + MFA)</text>
        <text class="svg-text label-text" x="228" y="184" text-anchor="start">id token + roles claim</text>
        <text class="svg-text flow-text" x="880" y="138" text-anchor="start">3 · Vault login via Auth0 OIDC</text>
        <text class="svg-text flow-text" x="654" y="481" text-anchor="start">internal traffic</text>
        <text class="svg-text label-text" x="520" y="668" text-anchor="start">image pull (AcrPull)</text>
        <text class="svg-text label-text" x="1475" y="540" text-anchor="middle">forensic audit stream</text>
        <text class="svg-text label-text" x="1286" y="600" text-anchor="start">escrow (managed identity)</text>
      </g>

      <!-- Terraform provisioning (dashed, upward) -->
      <g fill="none" stroke="#0F172A" stroke-width="1.5" stroke-dasharray="5,3">
        <path d="M 470,800 L 470,772" />
        <path d="M 1450,800 L 1450,772" />
      </g>
      <g fill="#0F172A" stroke="none">
        <polygon points="470,770 466,778 474,778" />
        <polygon points="1450,770 1446,778 1454,778" />
      </g>
    </svg>
  </div>

  <footer>
    <p>PAM Governance - Zero-Trust architecture overview</p>
  </footer>

  <script>
    function downloadSVG(theme = 'light') {
      const svgEl = document.getElementById('infographic');
      const clonedSvg = svgEl.cloneNode(true);

      const bgCol = clonedSvg.getElementById('svg-bg-color');
      if (bgCol) bgCol.remove();
      const borderRect = clonedSvg.getElementById('svg-border');
      if (borderRect) borderRect.remove();

      if (theme === 'dark') {
        const whiteFills = clonedSvg.querySelectorAll('[fill="#FFFFFF"]');
        whiteFills.forEach(f => f.setAttribute('fill', 'transparent'));

        const strokes = clonedSvg.querySelectorAll('[stroke="#0F172A"]');
        strokes.forEach(s => s.setAttribute('stroke', '#FFFFFF'));

        const fills = clonedSvg.querySelectorAll('[fill="#0F172A"]');
        fills.forEach(f => f.setAttribute('fill', '#FFFFFF'));
      }

      const texts = clonedSvg.querySelectorAll('text, tspan');
      texts.forEach(t => {
         t.setAttribute('fill', theme === 'dark' ? '#FFFFFF' : '#000000');
         t.style.fill = theme === 'dark' ? '#FFFFFF' : '#000000';
      });

      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(clonedSvg);
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(svgBlob);

      const link = document.createElement('a');
      link.href = url;
      link.download = theme === 'dark' ? 'architecture_dark.svg' : 'architecture_light.svg';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    async function downloadPNG() {
      const svgEl = document.getElementById('infographic');

      let fontDataUri = '';
      try {
        const cssResp = await fetch(
          'https://fonts.googleapis.com/css2?family=Cinzel:wght@700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap'
        );
        const cssText = await cssResp.text();
        const urlMatches = [...cssText.matchAll(/url\((https:\/\/fonts\.gstatic\.com[^)]+)\)/g)];
        let embeddedCss = cssText;
        for (const match of urlMatches) {
          try {
            const fontResp = await fetch(match[1]);
            const fontBuf = await fontResp.arrayBuffer();
            const base64 = btoa(String.fromCharCode(...new Uint8Array(fontBuf)));
            embeddedCss = embeddedCss.replace(match[1], `data:font/woff2;base64,${base64}`);
          } catch (e) {}
        }
        fontDataUri = embeddedCss;
      } catch (e) {
        console.warn('Could not embed fonts.', e);
      }

      const clonedSvg = svgEl.cloneNode(true);
      const bgCol = clonedSvg.getElementById('svg-bg-color');
      if (bgCol) bgCol.remove();
      const borderRect = clonedSvg.getElementById('svg-border');
      if (borderRect) borderRect.remove();
      if (fontDataUri) {
        const existingStyle = clonedSvg.querySelector('style');
        if (existingStyle) existingStyle.textContent = fontDataUri + '\n' + existingStyle.textContent;
      }

      const width = 1900;
      const height = 900;
      const serializer = new XMLSerializer();
      const svgString = serializer.serializeToString(clonedSvg);
      const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
      const DOMURL = window.URL || window.webkitURL || window;
      const blobUrl = DOMURL.createObjectURL(svgBlob);

      const image = new Image();
      image.width = width;
      image.height = height;
      image.onload = function () {
        const scale = 3;
        const canvas = document.createElement('canvas');
        canvas.width = width * scale;
        canvas.height = height * scale;
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.drawImage(image, 0, 0, width, height);
        const pngUrl = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.href = pngUrl;
        link.download = 'architecture.png';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        DOMURL.revokeObjectURL(blobUrl);
      };
      image.onerror = function (err) {
        console.error('PNG export failed', err);
        DOMURL.revokeObjectURL(blobUrl);
      };
      image.src = blobUrl;
    }
  </script>
</body>
</html>
