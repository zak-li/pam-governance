# =====================================================================
#  PAM Governance - App workload (Zero-Trust hardened)
#  Kong Gateway (north-south, edge LoadBalancer) + Istio mesh (mTLS)
#  The app is an Angular SPA served by a non-root nginx image built into the
#  Azure Container Registry. The nginx config and security headers are baked
#  into the image; only the runtime Auth0 config (assets/config.json) is mounted
#  from a ConfigMap so the app is portable across tenants.
#  The namespace does not use the 'restricted' PSA, because the Istio init
#  container needs NET_ADMIN/NET_RAW; hardening is on the app container instead.
# =====================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: pam-governance
  labels:
    istio-injection: enabled        # sidecar injection for automatic mTLS
---
# --- Mesh policy: mTLS between meshed services ---
# PERMISSIVE rather than STRICT: Kong (OpenResty) opens its upstream connections
# in a way its sidecar does not always upgrade to mTLS, so STRICT breaks the
# Kong->app hop with a 503. In PERMISSIVE mode Istio auto-mTLS still encrypts
# all traffic between pods that carry a sidecar; only the Kong edge can fall back
# to plaintext inside the cluster. For strict end-to-end mTLS, terminate at an
# Istio IngressGateway instead of Kong.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: default-mtls
  namespace: pam-governance
spec:
  mtls:
    mode: PERMISSIVE
---
# --- Originate mTLS to the app for meshed clients ---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: app-mtls
  namespace: pam-governance
spec:
  host: app-service.pam-governance.svc.cluster.local
  trafficPolicy:
    tls:
      mode: ISTIO_MUTUAL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: pam-governance
  labels:
    app: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          image: __APP_IMAGE__ # replaced by scripts/deploy-app.sh with the ACR image
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests: { cpu: "25m", memory: "48Mi" }
            limits:   { cpu: "250m", memory: "160Mi" }
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - { name: app-config, mountPath: /usr/share/nginx/html/assets, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: run, mountPath: /var/run }
      volumes:
        - name: app-config
          configMap: { name: app-config }
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: app-service
  namespace: pam-governance
  labels: { app: app }
  annotations:
    # Route through the ClusterIP (not pod IPs) so Istio auto-mTLS applies to the
    # Kong-to-app hop (otherwise Kong talks plaintext to the endpoints).
    ingress.kubernetes.io/service-upstream: "true"
    konghq.com/service-upstream: "true"
spec:
  type: ClusterIP
  ports:
    - { name: http, port: 80, targetPort: 8080 }
  selector:
    app: app
---
# --- NetworkPolicy: ingress limited to Kong and the Istio control plane ---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-boundary
  namespace: pam-governance
spec:
  podSelector:
    matchLabels: { app: app }
  policyTypes: ["Ingress", "Egress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
  # Egress is open, which the Istio sidecar needs to reach istiod, DNS and the API.
  # The attack surface of a static app is on ingress, which is locked down.
  egress:
    - {}
---
# --- Kong: edge rate limiting (anti brute-force and abuse) ---
apiVersion: configuration.konghq.com/v1
kind: KongPlugin
metadata:
  name: rate-limit
  namespace: pam-governance
config:
  minute: 60
  policy: local
plugin: rate-limiting
---
# --- Kong: ingress API gateway (north-south) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: pam-governance
  annotations:
    konghq.com/plugins: rate-limit
    konghq.com/protocols: "https"                # accept HTTPS only
    konghq.com/https-redirect-status-code: "301" # redirect http to https
spec:
  ingressClassName: kong
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: app-service
                port:
                  number: 80
