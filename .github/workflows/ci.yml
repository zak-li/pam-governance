name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform fmt and validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Check formatting
        run: terraform fmt -check -recursive

      - name: Initialize (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate

  tflint:
    name: tflint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init
      - run: tflint --chdir=terraform -f compact

  tfsec:
    name: tfsec security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install and run tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash
          tfsec terraform

  kubeconform:
    name: Validate Kubernetes manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install kubeconform
        run: |
          curl -sSLo /tmp/kc.tgz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kc.tgz -C /usr/local/bin kubeconform
      - name: Validate (ignore CRDs from Istio and Kong)
        run: kubeconform -strict -ignore-missing-schemas -summary kubernetes/app.yaml

  angular:
    name: Angular build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Provide placeholder stylesheet (real one is not versioned)
        run: test -f src/styles.css || echo "/* not versioned; provided at build time */" > src/styles.css
      - name: Production build
        run: npm run build

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: shellcheck scripts/*.sh
