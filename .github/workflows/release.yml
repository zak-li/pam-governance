name: Release

# Continuous delivery: pushing a semver tag (vX.Y.Z) cuts a GitHub Release.
# The tag must match the VERSION file and have a matching CHANGELOG section.
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify tag matches VERSION
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check VERSION file matches the tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          file="$(tr -d '[:space:]' < VERSION)"
          echo "tag=$tag  VERSION=$file"
          if [ "$tag" != "$file" ]; then
            echo "::error::Tag ($tag) does not match VERSION file ($file)."
            exit 1
          fi

  release:
    name: Publish GitHub Release
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract the CHANGELOG section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $1 == "##" && $2 == "[" ver "]" { flag = 1; next }
            /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi
          echo "----- release notes -----"
          cat release_notes.md

      - name: Create the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md \
            --verify-tag
